<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>RSSext</h1>
    <div id="head-buttons">
      <button id="toggle-view" title="Toggle View">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-group-category">
          <line x1="4" y1="4" x2="20" y2="4"></line>
          <line x1="9" y1="7" x2="20" y2="7"></line>
          <line x1="9" y1="10" x2="20" y2="10"></line>
          <line x1="4" y1="13" x2="20" y2="13"></line>
          <line x1="9" y1="16" x2="20" y2="16"></line>
          <line x1="9" y1="19" x2="20" y2="19"></line>
        </svg>
      </button>
      <button id="add-current" title="__MSG_ui_add_current__">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-add-container">
          <polyline points="20 8 20 4 4 4 4 20 20 20 20 16"></polyline>
          <line x1="16" y1="12" x2="23" y2="12"></line>
          <polyline points="21 10 23 12 21 14"></polyline>
        </svg>
      </button>
      <button id="open-settings" title="__MSG_ui_settings__">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-settings">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main id="app">
    <div id="empty-state" class="hidden">__MSG_ui_no_items__</div>
    <div id="feed-list"></div>
  </main>

  <dialog id="edit-dialog">
    <form method="dialog">
      <h2>__MSG_ui_edit_source__</h2>
      <label>
        Name:
        <input type="text" id="edit-name" required>
      </label>
      <label>
        Folder:
        <input type="text" id="edit-folder" list="folder-suggestions">
        <datalist id="folder-suggestions"></datalist>
      </label>
      <label>
        <input type="checkbox" id="edit-notify"> Enable Notifications
      </label>
      <div class="dialog-actions">
        <button type="button" id="delete-source" class="danger">Delete Source</button>
        <button type="submit" value="cancel">Cancel</button>
        <button type="submit" value="save" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="popup.js"></script>
</body>
</html>
