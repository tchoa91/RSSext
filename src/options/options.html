<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSSext Settings</title>
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>RSSext Settings</h1>
    </header>

    <main>
      <form id="settings-form">
        <fieldset>
          <legend>General</legend>
          <label>
            Update Interval:
            <select id="setting-interval">
              <option value="5">5 minutes</option>
              <option value="15">15 minutes</option>
              <option value="30">30 minutes</option>
              <option value="60">1 hour</option>
              <option value="120">2 hours</option>
              <option value="720">12 hours</option>
              <option value="1440">24 hours</option>
            </select>
          </label>
          <label>
            Retention:
            <select id="setting-ttl">
              <option value="1">1 day</option>
              <option value="3">3 days</option>
              <option value="7">1 week</option>
              <option value="14">2 weeks</option>
              <option value="30">1 month</option>
              <option value="60">2 months</option>
              <option value="180">6 months</option>
              <option value="365">1 year</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="setting-notify"> Enable Global Notifications
          </label>
        </fieldset>

        <fieldset>
          <legend>Appearance</legend>
          <label>
            Theme Color (Hue):
            <div class="range-wrapper">
              <input type="range" id="setting-hue" min="0" max="360" step="10">
              <span id="hue-value">210</span>
            </div>
          </label>
          <label>
            Interface Zoom:
            <select id="setting-zoom">
              <option value="small">Small</option>
              <option value="medium" selected>Medium</option>
              <option value="large">Large</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Data Management (OPML)</legend>
          <p class="description">Import or export your feed list. Importing allows you to migrate from other readers.</p>
          <div class="data-actions">
            <button type="button" id="btn-import-settings" class="primary">Import OPML</button>
            <button type="button" id="btn-export-settings">Export OPML</button>
            <button type="button" id="btn-delete-base" class="danger">Delete Base</button>
            <!-- Input file caché -->
            <input type="file" id="input-import-settings" accept=".opml,.xml" style="display:none">
          </div>
        </fieldset>
      </form>
    </main>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
